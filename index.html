<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>曼曼和小胖</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#FCFCFC;

font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

color:#111;

overflow:hidden;

}

.container{

text-align:center;

}

.name{

font-size:58px;

font-weight:300;

letter-spacing:4px;

opacity:0;

animation:fade .8s forwards;

}

.and{

margin:18px 0;

font-size:24px;

font-weight:300;

color:#777;

opacity:0;

animation:fade .8s .25s forwards;

}

.name:last-of-type{

animation-delay:.45s;

}

.button{

display:inline-block;

margin-top:90px;

text-decoration:none;

color:#111;

font-size:18px;

padding-bottom:6px;

border-bottom:1px solid #ccc;

transition:.35s;

opacity:0;

animation:fade .8s .7s forwards;

}

.button:hover{

letter-spacing:1px;

border-color:#111;

}

.footer{

position:fixed;

bottom:24px;

left:50%;

transform:translateX(-50%);

font-size:11px;

letter-spacing:3px;

color:#B8B8B8;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(12px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="container">

<div class="name">曼曼</div>

<div class="and">&</div>

<div class="name">小胖</div>

</div>

</div>

</body>
